name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node:
          - 20
          - 22

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: runner/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix runner

      - name: Type-check
        run: npm --prefix runner run check

      - name: Run tests
        run: npm --prefix runner test

      - name: Copy package assets
        run: npm --prefix runner run copy-assets

      - name: Check package contents
        working-directory: runner
        run: npm pack --dry-run
