name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: runner/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix runner

      - name: Verify tag matches package version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('runner/package.json', 'utf8'));
          const expectedTag = `v${pkg.version}`;

          if (process.env.TAG_NAME !== expectedTag) {
            console.error(`Tag ${process.env.TAG_NAME} does not match package version ${expectedTag}`);
            process.exit(1);
          }
          NODE

      - name: Update npm for trusted publishing (OIDC)
        run: npm install -g npm@latest

      - name: Skip if version already published
        id: check
        working-directory: runner
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "sdd-worker@${VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "sdd-worker@${VERSION} already on npm; skipping publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.check.outputs.published == 'false'
        working-directory: runner
        run: npm publish --access public
